name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A229BF: ${{ secrets.A229BF }}
          B67FB6: ${{ secrets.B67FB6 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A229BF', '')
          sec_b = os.environ.get('B67FB6', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 3fc5ca538c9fbe8c497e4020b3eecf -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 1f040e18171e51c297db1e643d8f27c27390 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
